name: 주유소 실시간 가격 및 유가 전망 알림

on:
  schedule:
    # 한국 시간 기준 오전 05:23분 실행 (UTC 20:23)
    - cron: '23 20 * * *'
    # 한국 시간 기준 오후 03:16분 실행 (UTC 06:16)
    - cron: '16 6 * * *'
  workflow_dispatch:

jobs:
  check-gas:
    runs-on: ubuntu-latest
    steps:
      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필요 프로그램 설치
        run: pip install requests beautifulsoup4

      - name: 가격 확인 및 텔레그램 전송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<EOF
          import requests, os, re
          from bs4 import BeautifulSoup
          from datetime import datetime, timedelta

          now_kst = datetime.utcnow() + timedelta(hours=9)
          weekdays = ['월요일', '화요일', '수요일', '목요일', '금요일', '토요일', '일요일']
          weekday_str = weekdays[now_kst.weekday()]
          date_str = f"{now_kst.year}년 {now_kst.month}월 {now_kst.day}일 {weekday_str}"
          time_str = now_kst.strftime('%H시 %M분')

          weather_title = "출근길" if now_kst.hour < 12 else "퇴근길"

          stations = [
              {'name': '오산 SK참존주유소', 'url': 'https://www.oilnow.co.kr/gas-station/A0002075'},
              {'name': '마도 지성주유소', 'url': 'https://www.oilnow.co.kr/gas-station/A0002055'},
              {'name': '오산 운암뜰주유소', 'url': 'https://www.oilnow.co.kr/gas-station/A0002576'}
          ]

          msg = f'<b>⛽ 주유소 실시간 가격 ⛽</b>\n\n날짜 : {date_str}\n시간 : {time_str}\n\n'
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          current_prices = []
          for s in stations:
              try:
                  res = requests.get(s['url'], headers=headers)
                  soup = BeautifulSoup(res.text, 'html.parser')
                  text = soup.get_text(separator=' ', strip=True)
                  match = re.search(r'휘발유\D*?([0-9,]{4,6})\s*원', text)
                  price = match.group(1) if match else "확인 불가"
                  msg += f'✔️ {s["name"]}: <b>{price}원</b>\n'
                  current_prices.append(price)
              except:
                  msg += f'❌ {s["name"]}: 접속 실패\n'
                  current_prices.append("실패")

          msg += f'\n<b>사랑하는 진수님</b> 오늘도 안전운전 하세요! 🚗\n\n'

          msg += '<b>😃 내일의 유가 및 전망 정보 😃</b>\n'
          try:
              search_url = "https://search.naver.com/search.naver?where=news&query=기름값+전망+전국평균"
              res_news = requests.get(search_url, headers=headers)
              soup_news = BeautifulSoup(res_news.text, 'html.parser')
              first_news = soup_news.select_one(".news_tit")
              news_title = first_news.get_text() if first_news else "유가 변동성 주시 필요"
              
              if "인상" in news_title or "오름세" in news_title or "상승" in news_title:
                  diff, trend_word = 5, "오를"
              elif "인하" in news_title or "내림세" in news_title or "하락" in news_title:
                  diff, trend_word = -5, "내릴"
              else:
                  diff, trend_word = 0, "큰 변동 없이 비슷할"
              
              for i, s in enumerate(stations):
                  p = current_prices[i].replace(',', '')
                  if p.isdigit():
                      future_p = format(int(p) + diff, ',')
                      msg += f'✔️ {s["name"]}: <b>{future_p}원</b>(예상)\n'
                  else:
                      msg += f'✔️ {s["name"]}: 데이터 수집중\n'
          except:
              msg += '전망 데이터 분석 실패\n'

          msg += '\n<b>😃 휘발유 시세 🤩</b>\n'
          try:
              res_m = requests.get("https://search.naver.com/search.naver?query=휘발유+가격", headers=headers)
              text_m = BeautifulSoup(res_m.text, 'html.parser').get_text(separator=' ', strip=True)
              m1 = re.search(r'휘발유[^\d]{0,20}?([12],[0-9]{3}\.[0-9]{2})[^\d]{0,10}?(상승|하락|보합|▲|▼)[^\d]{0,10}?([0-9.]+)[^\d]{0,10}?(\([+-]?[0-9.]+%\))?', text_m)
              if m1:
                  p_val, p_dir, p_amt, p_pct = m1.group(1), m1.group(2), m1.group(3), m1.group(4) or ""
                  sign = "🔺상승 " if p_dir in ["상승", "▲"] else "🔻하락 " if p_dir in ["하락", "▼"] else "➖보합 "
                  msg += f'<b>{p_val}원</b> (전일대비 {sign}{p_amt} {p_pct})\n'.replace('  ', ' ')
              else:
                  fallback = re.search(r'휘발유\s*\(원/리터\)\s*([12],[0-9]{3}\.[0-9]{2})', text_m)
                  msg += f'<b>{fallback.group(1)}원</b> (등락폭 수집 지연)\n' if fallback else '시세 수집 불가\n'
          except:
              msg += '시세 시스템 접속 오류\n'

          msg += f'\n<b>🥰 오늘의 {weather_title} 날씨 🤭</b>\n'
          try:
              res_w = requests.get("https://search.naver.com/search.naver?query=오산+날씨", headers=headers)
              soup_w = BeautifulSoup(res_w.text, 'html.parser')
              
              info_box = soup_w.find('div', class_='weather_info')
              text_w = info_box.get_text(separator=' ', strip=True) if info_box else ""
              t_m = re.search(r'현재 온도\s*([0-9.-]+)', text_w)
              temp = t_m.group(1) if t_m else "확인불가"
              
              weather_tag = soup_w.select_one('.weather_info .summary .weather')
              desc = weather_tag.get_text(strip=True) if weather_tag else "상태확인불가"
              
              # 강수량 또는 오전/오후 강수확률 절대 놓치지 않는 로직
              current_rain = re.search(r'강수\s*([0-9.]+mm)', text_w)
              
              if current_rain:
                  rain_info = f"현재 강수량 {current_rain.group(1)}"
              else:
                  # 네이버 주간 예보의 '오늘' 칸에 있는 비 올 확률 태그를 직접 긁어옴
                  rain_tags = soup_w.select('.week_item.today .rainfall')
                  if rain_tags and len(rain_tags) >= 2:
                      am_rain = rain_tags[0].get_text(strip=True)
                      pm_rain = rain_tags[1].get_text(strip=True)
                      rain_info = f"비 올 확률 오전 {am_rain}, 오후 {pm_rain}"
                  else:
                      fallback = re.search(r'강수확률\s*([0-9]+%)', text_w)
                      rain_info = f"비 올 확률 {fallback.group(1)}" if fallback else "비 올 확률 0%"
                  
              if "비" in desc or "소나기" in desc: emoji = "🌧️"
              elif "흐림" in desc: emoji = "☁️"
              elif "눈" in desc: emoji = "❄️"
              elif "구름" in desc: emoji = "⛅"
              else: emoji = "🌤️"
                  
              msg += f'{emoji} 오산 날씨: {desc} ({temp}℃) / {rain_info}\n'
          except:
              msg += '🌤️ 날씨 정보 수집 오류\n'

          msg += f'\n📢 관련 뉴스: {news_title}\n'
          msg += f'💡 코멘트: 최근 뉴스 동향을 보면 이번 주 기름값은 <b>{trend_word}</b> 것으로 보입니다.\n\n'
          
          msg += '<b>🗺️ 지역별 실시간 주유소 확인</b>\n'
          msg += '👉 <a href="https://search.naver.com/search.naver?query=오산+주유소">오산시 주유소 보기</a>   |   👉 <a href="https://search.naver.com/search.naver?query=화성+마도면+주유소">마도면 주유소 보기</a>\n'
          
          payload = {
              'chat_id': os.environ['TELEGRAM_CHAT_ID'], 
              'text': msg, 
              'parse_mode': 'HTML',
              'disable_web_page_preview': 'true'
          }
          requests.post(f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage", data=payload)
          EOF
