name: 아침/오후 주유소 가격 알림

on:
  schedule:
    # 1. 한국 시간 아침 7시 정각 (UTC 22:00)
    - cron: '0 22 * * *'
    # 2. 한국 시간 오후 5시 정각 (UTC 08:00)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-gas:
    runs-on: ubuntu-latest
    steps:
      - name: 파이썬 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필요 프로그램 설치
        run: pip install requests beautifulsoup4

      - name: 가격 확인 및 텔레그램 전송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<EOF
          import requests, os, re
          from bs4 import BeautifulSoup
          from datetime import datetime, timedelta
          
          # 한국 시간(KST) 구하기 (로봇의 세계표준시 UTC에 9시간 더하기)
          now_kst = datetime.utcnow() + timedelta(hours=9)
          date_str = f"{now_kst.year}년{now_kst.month}월{now_kst.day}일"
          time_str = now_kst.strftime('%H:%M')
          
          # 주유소 데이터 주소
          stations = [
              {'name': '오산 SK참존주유소', 'url': 'https://www.oilnow.co.kr/gas-station/A0002075'},
              {'name': '마도 지성주유소', 'url': 'https://www.oilnow.co.kr/gas-station/A0002055'},
              {'name': '오산 운암뜰주유소', 'url': 'https://www.oilnow.co.kr/gas-station/A0002576'}
          ]
          
          # 주인님이 요청하신 서식으로 헤더 작성
          msg = f'⛽ 실시간 휘발유 가격 브리핑 ⛽\n\n날짜 : {date_str}\n시간 : {time_str}\n\n'
          headers = {'User-Agent': 'Mozilla/5.0'}
          
          for s in stations:
              try:
                  res = requests.get(s['url'], headers=headers)
                  soup = BeautifulSoup(res.text, 'html.parser')
                  text = soup.get_text(separator=' ', strip=True)
                  match = re.search(r'휘발유\D*?([0-9,]{4,6})\s*원', text)
                  if match:
                      msg += f'✔️ {s["name"]}: {match.group(1)}원\n'
                  else:
                      msg += f'❓ {s["name"]}: 가격 확인 불가\n'
              except Exception:
                  msg += f'❌ {s["name"]}: 사이트 접속 실패\n'
                  
          # 마지막 인사말 맞춤 설정
          msg += '\n김진수님 오늘도 안전운전 하세요! 🚗'
          
          # 텔레그램 전송
          bot_token = os.environ.get("TELEGRAM_TOKEN")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID")
          url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
          requests.post(url, data={'chat_id': chat_id, 'text': msg})
          EOF
