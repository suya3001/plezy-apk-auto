name: 주유소 가격 및 유가 전망 알림

on:
  schedule:
    # 1. 한국 시간 아침 7시 정각 (UTC 22:00)
    - cron: '0 22 * * *'
    # 2. 한국 시간 오후 5시 정각 (UTC 08:00)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-gas:
    runs-on: ubuntu-latest
    steps:
      - name: 파이썬 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필요 프로그램 설치
        run: pip install requests beautifulsoup4

      - name: 가격 확인 및 텔레그램 전송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<EOF
          import requests, os, re
          from bs4 import BeautifulSoup
          from datetime import datetime, timedelta

          # 한국 시간(KST) 설정
          now_kst = datetime.utcnow() + timedelta(hours=9)
          date_str = f"{now_kst.year}년{now_kst.month}월{now_kst.day}일"
          time_str = now_kst.strftime('%H:%M')

          # 주유소 리스트
          stations = [
              {'name': '오산 SK참존주유소', 'url': 'https://www.oilnow.co.kr/gas-station/A0002075'},
              {'name': '마도 지성주유소', 'url': 'https://www.oilnow.co.kr/gas-station/A0002055'},
              {'name': '오산 운암뜰주유소', 'url': 'https://www.oilnow.co.kr/gas-station/A0002576'}
          ]

          # 메시지 헤더
          msg = f'⛽ 실시간 휘발유 가격 브리핑 ⛽\n\n날짜 : {date_str}\n시간 : {time_str}\n\n'
          headers = {'User-Agent': 'Mozilla/5.0'}

          current_prices = []

          # 1. 현재 가격 수집
          for s in stations:
              try:
                  res = requests.get(s['url'], headers=headers)
                  soup = BeautifulSoup(res.text, 'html.parser')
                  text = soup.get_text(separator=' ', strip=True)
                  match = re.search(r'휘발유\D*?([0-9,]{4,6})\s*원', text)
                  price = match.group(1) if match else "확인 불가"
                  msg += f'✔️ {s["name"]}: {price}원\n'
                  current_prices.append(price)
              except:
                  msg += f'❌ {s["name"]}: 접속 실패\n'
                  current_prices.append("실패")

          msg += f'\n김진수님 오늘도 안전운전 하세요! 🚗\n\n'

          # 2. 내일의 유가 정보 및 코멘트 수집 (뉴스 요약)
          msg += '😃내일의 유가 및 전망 정보😃\n'
          
          # 간단한 전망 로직 (뉴스 검색 기반)
          try:
              # 네이버 유가 뉴스 검색 (최신 동향 파악용)
              search_url = "https://search.naver.com/search.naver?where=news&query=기름값+전망+전국평균"
              res_news = requests.get(search_url, headers=headers)
              soup_news = BeautifulSoup(res_news.text, 'html.parser')
              first_news = soup_news.select_one(".news_tit")
              news_title = first_news.get_text() if first_news else "유가 변동성 주시 필요"
              
              # 내일 예상 가격 (현재는 안내 정책 과도기라 뉴스 트렌드 기반으로 코멘트 생성)
              # 실제 개별 주유소의 '내일 확정가'는 오피넷에서 아주 제한적으로 공개하므로 트렌드를 반영합니다.
              trend = "상승" if "인상" in news_title or "오름세" in news_title else "하락" if "인하" in news_title or "내림세" in news_title else "보합"
              
              for i, s in enumerate(stations):
                  p = current_prices[i].replace(',', '')
                  if p.isdigit():
                      # 간단한 예측 로직: 뉴스 트렌드가 상승이면 +5원, 하락이면 -5원 (시뮬레이션)
                      diff = 5 if trend == "상승" else -5 if trend == "하락" else 0
                      future_p = format(int(p) + diff, ',')
                      msg += f'✔️ {s["name"]}: {future_p}원(예상)\n'
                  else:
                      msg += f'✔️ {s["name"]}: 데이터 수집중\n'
                      
              msg += f'\n📢 유가 동향: {news_title}\n'
              msg += f'💡 코멘트: 현재 국제 유가 영향으로 이번 주 {trend}세가 예상됩니다. 주유 계획에 참고하세요.'
          except:
              msg += '데이터 분석 중 오류가 발생했습니다.'

          # 텔레그램 전송
          bot_token = os.environ.get("TELEGRAM_TOKEN")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID")
          url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
          requests.post(url, data={'chat_id': chat_id, 'text': msg})
          EOF
