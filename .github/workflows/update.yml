name: Plezy APK Auto Updater

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 최신버전 다운로드 및 압축 해제
        run: |
          # /latest 대신 /releases API를 호출하여 전체 목록을 가져온 뒤, 가장 최신(첫 번째) 파일 추출
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/edde746/plezy/releases | grep "browser_download_url.*arm64-v8a.tar.gz" | head -n 1 | cut -d '"' -f 4)
          wget $DOWNLOAD_URL -O plezy.tar.gz
          tar -xzvf plezy.tar.gz
          
          # 에러 해결: 이름이 같아서 멈추는 현상을 막기 위해 복사 후 덮어쓰기
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          cp "$APK_PATH" temp_plezy.apk
          mv temp_plezy.apk plezy.apk

      - name: 기존 파일 삭제
        run: |
          gh release delete latest_apk --cleanup-tag -y || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 압축 해제된 APK 업로드
        run: |
          gh release create latest_apk plezy.apk --title "최신 Plezy APK" --notes "자동으로 압축 해제된 파일입니다."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
