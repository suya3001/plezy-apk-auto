name: Plezy APK Auto Updater

on:
  schedule:
    # 매일 아침 6시, 밤 12시 실행
    - cron: '0 15,21 * * *'
  workflow_dispatch:

jobs:
  update-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 최신버전 다운로드 및 파일명에 버전 각인
        run: |
          # 1. 원본 API에서 최신 버전명(예: v1.31.3)을 똑똑하게 빼옵니다.
          VERSION=$(curl -s https://api.github.com/repos/edde746/plezy/releases | grep '"tag_name":' | head -n 1 | cut -d '"' -f 4)
          if [ -z "$VERSION" ]; then VERSION="latest"; fi
          
          # 2. 파일 다운로드 및 압축 해제
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/edde746/plezy/releases | grep "browser_download_url.*arm64-v8a.tar.gz" | head -n 1 | cut -d '"' -f 4)
          wget $DOWNLOAD_URL -O plezy.tar.gz
          tar -xzvf plezy.tar.gz
          
          # 3. 압축 풀린 apk 파일을 찾아 'plezy_v1.31.3.apk' 형태로 이름 변경!
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          cp "$APK_PATH" "plezy_${VERSION}.apk"
          
          # 환경변수에 버전 저장 (다음 단계에서 쓰기 위함)
          echo "APK_FILE=plezy_${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 기존 릴리즈 삭제
        run: |
          gh release delete latest_apk --cleanup-tag -y || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 버전이 각인된 최신 APK 업로드
        run: |
          # 파일명에 버전이 들어간 상태로 업로드하며, 타이틀에도 버전을 명시합니다.
          gh release create latest_apk "${{ env.APK_FILE }}" --title "Plezy 최신버전 (${{ env.VERSION }})" --notes "자동 추출된 ${{ env.VERSION }} 파일입니다."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
